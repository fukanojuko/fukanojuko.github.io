name: Assign reviewer

# PRが開かれたら matuyuhi にレビューを自動依頼する。
on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    # 自分自身のPRにはレビュー依頼できないのでスキップする
    if: github.event.pull_request.user.login != 'matuyuhi'
    steps:
      - name: Request review from matuyuhi
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['matuyuhi'],
              });
              core.info('Requested review from matuyuhi');
            } catch (error) {
              // matuyuhi がコラボレーターでない等で失敗してもCIは落とさない
              core.warning(`Failed to request reviewer: ${error.message}`);
            }
