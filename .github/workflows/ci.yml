name: CI

# PR時、および content ブランチへの push 時に、型/コンテンツチェックとビルドを検証する
# （デプロイはしない）。content の push に対する検証結果は、自動PRの head SHA に
# 紐づくため content→main のPR上にもチェックとして表示される。
on:
  pull_request:
    branches: [main]
  push:
    branches: [content]
  workflow_dispatch:

permissions:
  contents: read

# 同一PRへの連続pushで古いCIをキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version # 24.16.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type & content check
        run: npm run check
      - name: Build
        run: npm run build
